<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HFT Terminal | Live</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="terminal">
    <div class="topbar">
      <div class="topbar-left">
        <div class="app-badge">
          <span class="dot" id="statusDot"></span>
          <span class="app-title">HFT Terminal</span>
        </div>
        <div class="pill" id="productPill">BTC-USD</div>
        <div class="pill muted" id="connPill">Connecting…</div>
      </div>
      <div class="topbar-right">
        <button class="ghost" onclick="startSimulation()" title="Fallback local simulation">Start</button>
        <button class="ghost" onclick="stopSimulation()" title="Fallback local simulation">Stop</button>
      </div>
    </div>

    <div class="layout">
      <!-- LEFT: Orderbook -->
      <section class="window" id="winOrderbook">
        <div class="winbar">
          <div class="tabs">
            <button class="tab active" data-tab="orderbook">Orderbook</button>
            <button class="tab" data-tab="dom">DOM Ladder</button>
            <button class="tab" data-tab="screener">Screener</button>
            <button class="tab" data-tab="watchlist">Watchlist</button>
          </div>
          <div class="win-actions"><span class="xbtn" title="Close (visual only)">×</span></div>
        </div>
        <div class="wincontent">
          <div class="ob-header">
            <div class="ob-symbol">
              <span class="sym-dot"></span>
              <span id="obSymbol">BTC-USD</span>
              <span class="muted">·</span>
              <span class="muted" id="obPrice">—</span>
            </div>
            <div class="ob-controls">
              <span class="chip">Center</span>
              <span class="chip">Auto</span>
            </div>
          </div>

          <div class="ob-grid-head">
            <span class="muted">Price</span>
            <span class="muted right">Size</span>
          </div>
          <div class="ob-grid" id="orderbookRows"></div>

          <div class="ob-foot">
            <div class="bar-split" title="Recent buy vs sell prints">
              <div class="bar-left" id="buyPct">—</div>
              <div class="bar-right" id="sellPct">—</div>
            </div>
            <div class="muted tiny" id="volSummary">24h vol: —</div>
          </div>
        </div>
      </section>

      <!-- CENTER: Chart -->
      <section class="window" id="winChart">
        <div class="winbar">
          <div class="tabs">
            <button class="tab active">Historical Chart</button>
            <button class="tab">Footprint Chart</button>
          </div>
          <div class="win-actions"><span class="xbtn" title="Close (visual only)">×</span></div>
        </div>
        <div class="chartbar">
          <div class="pill" id="chartSymbol">BTC-USD</div>
          <div class="pill muted">Candles</div>
          <div class="pill muted">1m</div>
          <div class="pill muted">Live</div>
          <div class="spacer"></div>
          <div class="muted tiny" id="lastUpdate">—</div>
        </div>
        <div class="chartwrap">
          <canvas id="priceChart" class="chart-canvas"></canvas>
        </div>
      </section>

      <!-- BOTTOM LEFT: Trades -->
      <section class="window" id="winTrades">
        <div class="winbar">
          <div class="tabs"><button class="tab active">Trades</button></div>
          <div class="win-actions"><span class="xbtn" title="Close (visual only)">×</span></div>
        </div>
        <div class="wincontent">
          <div class="trade-top">
            <div class="ob-symbol">
              <span class="sym-dot"></span>
              <span id="tradesSymbol">BTC-USD</span>
              <span class="muted">·</span>
              <span class="muted" id="tradeCount">— trades</span>
            </div>
            <div class="trade-pct" aria-label="Recent buy vs sell">
              <div class="trade-buybar" id="tradeBuyBar"></div>
              <div class="trade-sellbar" id="tradeSellBar"></div>
            </div>
          </div>

          <div class="table">
            <div class="thead">
              <div>Time</div>
              <div>Exch</div>
              <div class="right">Price</div>
              <div class="right">Qty</div>
              <div class="right">Value</div>
              <div class="right">S</div>
            </div>
            <div class="tbody" id="tradesTable"></div>
          </div>
        </div>
      </section>

      <!-- BOTTOM RIGHT: Stats -->
      <section class="window" id="winStats">
        <div class="winbar">
          <div class="tabs">
            <button class="tab active">OB Stats</button>
            <button class="tab">Overview</button>
            <button class="tab">Chart</button>
            <button class="tab">Liquidity</button>
          </div>
          <div class="win-actions"><span class="xbtn" title="Close (visual only)">×</span></div>
        </div>
        <div class="wincontent">
          <div class="table">
            <div class="thead">
              <div>Exchange</div>
              <div class="right">Mid</div>
              <div class="right">Bid 2%</div>
              <div class="right">Ask 2%</div>
              <div class="right">Δ 2%</div>
              <div class="right">Bid 10%</div>
              <div class="right">Ask 10%</div>
              <div class="right">Δ 10%</div>
            </div>
            <div class="tbody" id="statsTable"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="statusbar">
      <div class="sb-left">
        <span class="muted tiny">Views</span>
        <span class="muted tiny">·</span>
        <span class="muted tiny" id="statusText">Ready</span>
      </div>
      <div class="sb-right">
        <span class="muted tiny" id="vol24hText">Vol: —</span>
        <span class="muted tiny">|</span>
        <span class="muted tiny" id="midText">Mid: —</span>
        <span class="muted tiny">|</span>
        <span class="muted tiny" id="spreadText">Spr: —</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
