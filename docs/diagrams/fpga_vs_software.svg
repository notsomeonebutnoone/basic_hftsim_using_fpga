<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Comparison of FPGA-style pipeline vs typical software loop">
  <defs>
    <style>
      .bg{fill:#0b0b0f}
      .panel{fill:#111118;stroke:#2a2a36;stroke-width:2}
      .title{fill:#f5f5f5;font:600 22px Inter,Segoe UI,Arial,sans-serif}
      .sub{fill:#a1a1aa;font:400 15px Inter,Segoe UI,Arial,sans-serif}
      .hdr{fill:#f5f5f5;font:600 16px Inter,Segoe UI,Arial,sans-serif}
      .txt{fill:#a1a1aa;font:400 14px Inter,Segoe UI,Arial,sans-serif}
      .mono{fill:#d4d4d8;font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .chip{fill:#ffffff;opacity:0.08;stroke:#2a2a36;stroke-width:2}
      .line{stroke:#52525b;stroke-width:2}
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#52525b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="18"/>
  <text class="title" x="42" y="62">“FPGA‑Style” vs Typical Software</text>
  <text class="sub" x="42" y="90">Same tasks, different mental model: fixed stages + parallelism vs one big loop.</text>

  <g transform="translate(60,130)">
    <rect class="panel" width="520" height="240" rx="14"/>
    <text class="hdr" x="22" y="44">FPGA‑style pipeline</text>
    <text class="txt" x="22" y="72">Each stage is a small block; work overlaps in time.</text>
    <rect class="chip" x="22" y="98" width="476" height="46" rx="10"/>
    <text class="mono" x="40" y="126">feed → book → strategy → exec</text>
    <line class="line" x1="80" y1="165" x2="440" y2="165" marker-end="url(#arr)"/>
    <text class="txt" x="22" y="200">Pros: predictable, composable, measurable</text>
  </g>

  <g transform="translate(620,130)">
    <rect class="panel" width="520" height="240" rx="14"/>
    <text class="hdr" x="22" y="44">Typical software loop</text>
    <text class="txt" x="22" y="72">Everything happens sequentially in one thread.</text>
    <rect class="chip" x="22" y="98" width="476" height="46" rx="10"/>
    <text class="mono" x="40" y="126">for msg in feed: process(msg)</text>
    <line class="line" x1="80" y1="165" x2="440" y2="165" marker-end="url(#arr)"/>
    <text class="txt" x="22" y="200">Pros: simple; Cons: harder to reason about stage latency</text>
  </g>
</svg>

