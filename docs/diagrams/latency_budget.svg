<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Latency budget timeline across pipeline stages">
  <defs>
    <style>
      .bg{fill:#0b0b0f}
      .panel{fill:#111118;stroke:#2a2a36;stroke-width:2}
      .title{fill:#f5f5f5;font:600 22px Inter,Segoe UI,Arial,sans-serif}
      .sub{fill:#a1a1aa;font:400 15px Inter,Segoe UI,Arial,sans-serif}
      .label{fill:#f5f5f5;font:600 14px Inter,Segoe UI,Arial,sans-serif}
      .mono{fill:#d4d4d8;font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .tick{stroke:#27272a;stroke-width:2}
      .bar{fill:#ffffff;opacity:0.10;stroke:#2a2a36;stroke-width:2}
      .bar2{fill:#ffffff;opacity:0.08;stroke:#2a2a36;stroke-width:2}
      .bar3{fill:#ffffff;opacity:0.06;stroke:#2a2a36;stroke-width:2}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="18"/>
  <text class="title" x="42" y="62">Latency Budget (What “Low‑Latency” Means)</text>
  <text class="sub" x="42" y="90">Even in a toy simulator, measuring each stage builds the right mental model.</text>

  <g transform="translate(60,130)">
    <rect class="panel" width="1080" height="240" rx="14"/>

    <!-- axis -->
    <line class="tick" x1="70" y1="190" x2="1010" y2="190"/>
    <line class="tick" x1="70" y1="70" x2="70" y2="210"/>
    <text class="mono" x="58" y="228">t</text>

    <!-- ticks -->
    <g>
      <line class="tick" x1="250" y1="184" x2="250" y2="196"/>
      <line class="tick" x1="430" y1="184" x2="430" y2="196"/>
      <line class="tick" x1="610" y1="184" x2="610" y2="196"/>
      <line class="tick" x1="790" y1="184" x2="790" y2="196"/>
      <line class="tick" x1="970" y1="184" x2="970" y2="196"/>
      <text class="mono" x="232" y="220">1µs</text>
      <text class="mono" x="412" y="220">2µs</text>
      <text class="mono" x="592" y="220">3µs</text>
      <text class="mono" x="772" y="220">4µs</text>
      <text class="mono" x="952" y="220">5µs</text>
    </g>

    <!-- bars -->
    <g>
      <rect class="bar" x="90" y="92" width="210" height="34" rx="10"/>
      <text class="label" x="104" y="114">Feed parse</text>
      <text class="sub" x="250" y="114">~ sub‑µs goal</text>
    </g>
    <g>
      <rect class="bar2" x="305" y="92" width="165" height="34" rx="10"/>
      <text class="label" x="319" y="114">Book update</text>
    </g>
    <g>
      <rect class="bar3" x="475" y="92" width="220" height="34" rx="10"/>
      <text class="label" x="489" y="114">Strategy</text>
    </g>
    <g>
      <rect class="bar2" x="700" y="92" width="250" height="34" rx="10"/>
      <text class="label" x="714" y="114">Execution / I/O</text>
    </g>

    <text class="sub" x="90" y="155">This repo measures timing in software (ns/µs). Real FPGA pipelines can be orders of magnitude faster.</text>
  </g>
</svg>

